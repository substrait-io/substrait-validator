version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      strum:
        applies-to: version-updates
        patterns:
          - "strum*"
      prost:
        applies-to: version-updates
        patterns:
          - "prost*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "pip"
    directory: "/py"
    schedule:
      interval: "daily"
